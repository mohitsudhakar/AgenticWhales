# fly.toml app configuration file generated for agenticwhales on 2026-05-05T08:44:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agenticwhales'
primary_region = 'sjc'

[processes]
  app = "python -m web"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
